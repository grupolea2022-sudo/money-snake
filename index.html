<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Money Snake: War Edition</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { background: #000; margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; }
        #ui { position: fixed; top: 15px; left: 15px; color: #FFD700; font-size: 24px; font-weight: bold; z-index: 10; text-shadow: 2px 2px #000; }
        #btn-retirar { position: fixed; top: 15px; right: 15px; background: #FFD700; color: #000; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui">Tu Saldo: $<span id="balance">1.00</span></div>
    <button id="btn-retirar" onclick="alert('Retiro mínimo $5.00 USD')">RETIRAR</button>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: '#0a1a0a',
            physics: { default: 'arcade' },
            scene: { preload, create, update }
        };

        const game = new Phaser.Game(config);
        let player, playerSegments = [], enemies = [], foodGroup, score = 1.00;

        function preload() {
            let g = this.make.graphics({x: 0, y: 0, add: false});
            // Textura cabeza jugador (Oro)
            g.fillStyle(0xffd700, 1).fillCircle(15, 15, 15);
            g.generateTexture('head', 30, 30);
            // Textura cuerpo jugador
            g.clear().fillStyle(0xffd700, 0.8).fillCircle(10, 10, 10);
            g.generateTexture('body', 20, 20);
            // Textura enemigos (Rojo/Varios)
            g.clear().fillStyle(0xff4444, 1).fillCircle(15, 15, 15);
            g.generateTexture('enemyHead', 30, 30);
            // Comida (Monedas)
            g.clear().fillStyle(0x00ff00, 1).fillCircle(8, 8, 8);
            g.generateTexture('coin', 16, 16);
        }

        function create() {
            foodGroup = this.physics.add.group();

            // Crear Jugador
            player = this.physics.add.image(window.innerWidth/2, window.innerHeight/2, 'head');
            player.setCollideWorldBounds(true);
            playerSegments.push(player);

            // Crear Enemigos (Bots)
            for(let i=0; i<4; i++) {
                let en = this.physics.add.image(Phaser.Math.Between(100, 500), Phaser.Math.Between(100, 500), 'enemyHead');
                en.setTint(Phaser.Math.Between(0xaaaaaa, 0xffffff));
                enemies.push(en);
            }

            // Colisiones
            this.physics.add.overlap(player, foodGroup, eatCoin, null, this);
            this.physics.add.collider(player, enemies, (p, e) => {
                alert("CHOCASTE DE FRENTE. Perdiste tu dólar.");
                location.reload();
            });

            // Control táctil
            this.input.on('pointermove', (pointer) => {
                this.physics.moveToObject(player, pointer, 220);
            });
        }

        function update() {
            // Efecto de seguimiento de la cola
            for (let i = playerSegments.length - 1; i > 0; i--) {
                playerSegments[i].x = playerSegments[i-1].x;
                playerSegments[i].y = playerSegments[i-1].y;
            }

            // Movimiento simple de enemigos
            enemies.forEach(en => {
                if (Phaser.Math.Between(0, 100) > 98) {
                    en.setVelocity(Phaser.Math.Between(-150, 150), Phaser.Math.Between(-150, 150));
                }
            });

            // Generar monedas al azar si hay pocas
            if (foodGroup.countActive() < 10) {
                foodGroup.create(Phaser.Math.Between(20, window.innerWidth-20), Phaser.Math.Between(20, window.innerHeight-20), 'coin');
            }
        }

        function eatCoin(p, coin) {
            coin.destroy();
            score += 0.05; // Cada moneda suma centavos al dólar
            document.getElementById('balance').innerText = score.toFixed(2);
            
            // Crecer agregando un nuevo segmento
            let lastSeg = playerSegments[playerSegments.length - 1];
            let newSeg = this.physics.add.image(lastSeg.x, lastSeg.y, 'body');
            playerSegments.push(newSeg);
        }
    </script>
</body>
</html>
